<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Tailwind (giả sử bạn đang build bằng Vite) -->

  <meta name="title" content="Dat's Site">
  <meta name="description" content="Hi, my name is Dat Tran. I'm the Web Developer.">
</head>

<body>

<!-- banner -->
<section class="banner">
  <div class="banner-container">
    <h1 class="banner-title">
      <span class="banner-text">
        Hi, my name is <span class="text-teal-400">Tran Tien Dat</span>
      </span>
      <span class="banner-text">I'm the Web Developer.</span>
    </h1>

    <a href="#about-me" class="banner-cta">
      <span class="banner-cta-text">Know more</span>
    </a>
  </div>
</section>
<!-- banner ./ -->

<!-- about -->
<section id="about-me" class="about">
  <div class="about-container">
    <h2 class="about-title">About Me</h2>

    <div class="about-grid">
      <div class="about-avatar">
        <img src="https://nguyenhuuquyen.com/imgs/avatar.png" alt="avatar">
      </div>

      <div class="about-content">
        <p class="about-text">
          I love programming, application development, and research software architecture...
        </p>

        <a href="#" class="about-cta">
          <span>View My CV</span>
        </a>
      </div>
    </div>
  </div>
</section>

<!-- contact -->
<section id="contact" class="contact">
  <div class="contact-container">
    <h2 class="contact-title">Contact</h2>

    <p class="contact-desc">
      <span class="contact-highlight">I LOOK FORWARD TO WORKING WITH YOU</span>
      <span>Let's connect for work</span>
    </p>
  </div>

  <a href="mailto:trandat868@gmail.com" class="contact-btn">
    <span>Send An Email Now</span>
  </a>
</section>

<!-- footer -->
<footer class="footer">
  <div class="footer-container">

    <ul class="footer-social">
      <li><img src="/imgs/twitter.svg" /></li>
      <li><img src="/imgs/linkedin.svg" /></li>
      <li><img src="/imgs/github.svg" /></li>
    </ul>

    <hr class="footer-line"/>
    <p class="footer-name">Tran Tien Dat</p>
  </div>
</footer>

</body>
</html>
